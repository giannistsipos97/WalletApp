<div
  class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4"
>
  <div
    class="bg-white dark:bg-slate-800 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl border border-slate-100 dark:border-slate-700"
  >
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-black text-slate-900 dark:text-white">
        Adjust Balance
      </h3>
      <button
        (click)="close.emit()"
        class="text-slate-400 hover:text-slate-600"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="space-y-4">
      <div>
        <label
          class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 block"
        >
          Current Balance (€)
        </label>
        <input
          [formControl]="balanceControl"
          type="number"
          step="0.01"
          class="w-full bg-slate-100 dark:bg-slate-900 dark:text-white text-black border-2 border-transparent focus:border-emerald-500 rounded-2xl p-4 text-2xl font-bold"
          placeholder="0.00"
        />
      </div>

      <div class="grid grid-cols-2 gap-3 pt-4">
        <button
          (click)="close.emit()"
          class="p-4 rounded-2xl font-bold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors"
        >
          Cancel
        </button>
        <button
          (click)="save()"
          class="p-4 rounded-2xl font-bold bg-emerald-500 text-white hover:bg-emerald-600 shadow-lg shadow-emerald-500/20 transition-all active:scale-95"
        >
          Save Changes
        </button>
      </div>
    </div>
  </div>
</div>
