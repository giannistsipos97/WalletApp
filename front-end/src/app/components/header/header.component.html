<nav
  class="p-6 flex items-center justify-between bg-white dark:bg-slate-800 shadow-sm sticky top-0 z-50"
>
  <div class="flex items-center gap-4">
    <button
      (click)="headerService.toggleDrawer()"
      class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all text-slate-600 dark:text-slate-300"
    >
      <i class="fa-solid fa-bars-staggered text-xl"></i>
    </button>

    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 shrink-0 rounded-full bg-emerald-100 dark:bg-emerald-900 flex items-center justify-center border-2 border-emerald-500"
      >
        <span class="text-emerald-700 dark:text-emerald-300 font-bold text-xs">
          {{ avatarLetters() }}
        </span>
      </div>

      <div class="flex flex-col">
        <div class="flex items-center gap-2">
          <h1
            class="text-sm sm:text-base font-black text-slate-900 dark:text-white leading-tight"
          >
            {{ headerService.title() }}
          </h1>
        </div>
        <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">
          {{ headerService.subtitle() }}
        </p>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      (click)="toggleTheme()"
      class="p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-all"
      [title]="themeService.isDarkMode() ? 'Switch to Light' : 'Switch to Dark'"
    >
      @if (themeService.isDarkMode()) {
        <i class="fa-solid fa-sun text-yellow-500 text-xl sm:text-2xl"></i>
      } @else {
        <i class="fa-solid fa-moon text-indigo-800 text-xl sm:text-2xl"></i>
      }
    </button>

    <button
      (click)="logout()"
      class="p-2 fa-solid fa-right-from-bracket text-xl sm:text-2xl text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 rounded-lg transition-colors"
    ></button>
  </div>

  <!-- <button class="p-2 text-slate-400 hover:text-emerald-500 transition-colors">
    <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
  </button> -->
</nav>
