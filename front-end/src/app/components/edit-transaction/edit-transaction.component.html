<div
  class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4"
>
  <div
    class="bg-white dark:bg-slate-800 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl border border-slate-100 dark:border-slate-700"
  >
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <h3 class="text-xl font-black text-slate-900 dark:text-white">
          Transaction Details
        </h3>
        <button
          (click)="toggleEdit()"
          type="button"
          [class.bg-emerald-500]="!isReadOnly()"
          [class.text-white]="!isReadOnly()"
          [class.border-emerald-500]="!isReadOnly()"
          class="w-8 h-8 flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-700 text-slate-400 hover:text-emerald-500 transition-all active:scale-90"
        >
          <i class="fa-solid fa-pen text-[10px]"></i>
        </button>
      </div>
      <button
        (click)="close.emit()"
        class="text-slate-400 hover:text-slate-600 transition-colors"
      >
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>

    <form [formGroup]="editForm" class="space-y-4">
      <div>
        <label
          class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 block"
          >Description</label
        >
        <input
          formControlName="description"
          type="text"
          [readonly]="isReadOnly()"
          [class.opacity-60]="isReadOnly()"
          [class.cursor-not-allowed]="isReadOnly()"
          class="w-full bg-slate-100 dark:bg-slate-900 dark:text-white text-black border-2 border-transparent focus:border-emerald-500 rounded-2xl p-4 font-semibold outline-none transition-all"
        />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label
            class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 block"
            >Amount (€)</label
          >
          <input
            formControlName="amount"
            type="number"
            step="0.01"
            [readonly]="isReadOnly()"
            [class.opacity-60]="isReadOnly()"
            [class.cursor-not-allowed]="isReadOnly()"
            class="w-full bg-slate-100 dark:bg-slate-900 dark:text-white text-black border-2 border-transparent focus:border-emerald-500 rounded-2xl p-4 font-bold outline-none transition-all"
          />
        </div>
        <div>
          <label
            class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 block"
            >Date</label
          >
          <input
            formControlName="date"
            type="date"
            [readonly]="isReadOnly()"
            [class.opacity-60]="isReadOnly()"
            [class.cursor-not-allowed]="isReadOnly()"
            class="w-full bg-slate-100 dark:bg-slate-900 dark:text-white text-black border-2 border-transparent focus:border-emerald-500 rounded-2xl p-4 font-semibold outline-none transition-all"
          />
        </div>
      </div>

      <div>
        <label
          class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 block"
          >Category</label
        >
        <div class="relative">
          <select
            formControlName="category"
            [attr.disabled]="isReadOnly() ? true : null"
            [class.opacity-60]="isReadOnly()"
            [class.cursor-not-allowed]="isReadOnly()"
            class="w-full bg-slate-100 dark:bg-slate-900 dark:text-white text-black border-2 border-transparent focus:border-emerald-500 rounded-2xl p-4 font-semibold outline-none transition-all appearance-none"
          >
            <option *ngFor="let cat of categories" [value]="cat._id">
              {{ cat.name }}
            </option>
          </select>
          @if (!isReadOnly()) {
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"
            >
              <i class="fa-solid fa-chevron-down text-xs"></i>
            </div>
          }
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 pt-4">
        <button
          type="button"
          (click)="close.emit()"
          class="p-4 rounded-2xl font-bold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors"
        >
          {{ isReadOnly() ? "Close" : "Cancel" }}
        </button>

        @if (!isReadOnly()) {
          <button
            type="submit"
            (click)="onSave()"
            [disabled]="editForm.invalid"
            class="p-4 rounded-2xl font-bold bg-emerald-500 text-white hover:bg-emerald-600 shadow-lg shadow-emerald-500/20 transition-all active:scale-95 disabled:opacity-50"
          >
            Save Changes
          </button>
        } @else {
          <div
            class="p-4 rounded-2xl bg-slate-50 dark:bg-slate-900/50 flex items-center justify-center"
          >
            <span class="text-xs font-bold tracking-widest text-slate-400"
              >Save Changes</span
            >
          </div>
        }
      </div>
    </form>
  </div>
</div>
