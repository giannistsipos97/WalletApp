<div
  class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col items-center justify-center p-6 transition-colors duration-300"
>
  @if (view !== "welcome") {
    <button
      (click)="showWelcome()"
      class="absolute top-6 left-6 text-slate-400 hover:text-indigo-600 transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
    </button>
  }

  <button
    (click)="themeService.toggleTheme()"
    class="absolute top-6 right-6 p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-lg border border-slate-100 dark:border-slate-700 transition-all active:scale-90"
  >
    @if (themeService.darkMode()) {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 text-yellow-400"
        fill="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"
        />
      </svg>
    } @else {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 text-orange-500"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"
        />
      </svg>
    }
  </button>

  <div class="w-full max-w-sm">
    @if (view === "welcome") {
      <div class="text-center animate-in fade-in zoom-in duration-500">
        <div
          class="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center shadow-2xl shadow-indigo-500/50 mx-auto mb-8"
        >
          <span class="text-white text-4xl font-bold">W</span>
        </div>
        <h1 class="text-4xl font-extrabold text-slate-900 dark:text-white mb-4">
          WalletApp
        </h1>
        <p class="text-slate-500 dark:text-slate-400 mb-10 text-lg">
          Your finances, simplified.
        </p>

        <div class="space-y-4 w-72 mx-auto">
          <button
            (click)="showRegister()"
            class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg"
          >
            Get Started
          </button>
          <button
            (click)="showLogin()"
            class="w-full bg-white dark:bg-slate-800 text-slate-900 dark:text-white py-4 rounded-2xl font-bold border border-slate-200 dark:border-slate-700"
          >
            Sign In
          </button>
        </div>
      </div>
    } @else if (view === "login") {
      <app-login></app-login>
    } @else if (view === "register") {
      <app-register></app-register>
    }
  </div>
</div>
