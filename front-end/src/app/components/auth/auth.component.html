<div
  class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col items-center justify-center p-6 transition-colors duration-300 relative"
>
  @if (!isWelcomePage()) {
    <button
      (click)="navigateTo('')"
      class="absolute top-6 left-6 text-slate-400 dark:text-slate-500 hover:text-emerald-600 dark:hover:text-emerald-500 transition-colors duration-200"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
    </button>
  }

  <button
    (click)="themeService.toggleTheme()"
    class="absolute top-6 right-6 p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-lg border border-slate-100 dark:border-slate-700 transition-all active:scale-90 duration-200"
  >
    @if (themeService.isDarkMode()) {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 text-yellow-400"
        fill="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"
        />
      </svg>
    } @else {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 text-orange-500"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"
        />
      </svg>
    }
  </button>

  <div class="w-full max-w-sm">
    @if (isWelcomePage()) {
      <div class="text-center animate-in fade-in zoom-in duration-500">
        <div
          class="bg-emerald-600 dark:bg-emerald-600 w-20 h-20 rounded-3xl flex items-center justify-center shadow-2xl shadow-emerald-500/50 mx-auto mb-8 transition-colors duration-300"
        >
          <span class="text-white text-4xl font-bold">W</span>
        </div>
        <h1
          class="text-4xl font-extrabold text-slate-900 dark:text-white mb-4 tracking-tight"
        >
          WalletApp
        </h1>
        <p
          class="text-slate-500 dark:text-slate-400 mb-10 text-lg leading-relaxed"
        >
          Your finances, simplified.
        </p>

        <div class="space-y-4 w-72 mx-auto">
          <button
            (click)="navigateTo('register')"
            class="w-full bg-emerald-600 dark:bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-500/20 active:scale-95 transition-all duration-200"
          >
            Get Started
          </button>

          <button
            (click)="navigateTo('login')"
            class="w-full bg-white dark:bg-slate-800 text-slate-900 dark:text-white py-4 rounded-2xl font-bold border border-slate-200 dark:border-slate-700 active:scale-95 transition-all duration-200 focus:ring-2 focus:ring-emerald-500 outline-none"
          >
            Sign In
          </button>
        </div>
      </div>
    } @else {
      <router-outlet></router-outlet>
    }
  </div>
</div>
