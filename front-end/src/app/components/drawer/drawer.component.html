@if (headerService.isDrawerOpen()) {
  <div
    (click)="headerService.toggleDrawer()"
    class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] transition-opacity"
  ></div>
}

<aside
  [class.translate-x-0]="headerService.isDrawerOpen()"
  [class.-translate-x-full]="!headerService.isDrawerOpen()"
  class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-slate-800 shadow-2xl z-[70] transition-transform duration-300 ease-in-out border-r border-slate-100 dark:border-slate-700 p-6"
>
  <div class="flex items-center justify-between mb-8">
    <span class="text-xl font-black text-emerald-500 italic"
      >TrackingWallet</span
    >
    <button (click)="headerService.toggleDrawer()" class="p-2 text-slate-400">
      <i class="fa-solid fa-xmark text-xl"></i>
    </button>
  </div>

  <nav class="space-y-2">
    <a
      routerLink="/dashboard"
      (click)="headerService.toggleDrawer()"
      class="flex items-center cursor-pointer dark:text-white gap-3 p-4 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 font-bold transition-colors"
    >
      <i class="fa-solid fa-house"></i> Dashboard
    </a>
    <a
      routerLink="/analytics"
      (click)="headerService.toggleDrawer()"
      class="flex items-center gap-3 p-4 cursor-pointer dark:text-white rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 font-bold transition-colors"
    >
      <i class="fa-solid fa-chart-line"></i> Analytics
    </a>
  </nav>
</aside>
